<!DOCTYPE HTML>
<html lang="ja">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
    <title>ぷよぷよオンライン対戦</title>

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;700;900&display=swap" rel="stylesheet">

    <!-- Game scripts (order matters!) -->
    <script src="src/rng.js"></script>
    <script src="src/config.js"></script>
    <script src="src/stage.js"></script>
    <script src="src/score.js"></script>
    <script src="src/puyoimage.js"></script>
    <script src="src/player.js"></script>
    <script src="src/network.js"></script>
    <script src="src/ui.js"></script>
    <script src="src/ojama.js"></script>
    <script src="src/game.js"></script>

    <link rel="stylesheet" href="css/style.css">

    <script>
      window.addEventListener('load', () => {
        Game.initialize();
      });
    </script>
  </head>
  <body>
    <!-- 全体を拡縮するためのラッパー -->
    <div id="scale-wrapper" style="position: absolute; top: 0; left: 0; transform-origin: top left; display: flex; justify-content: center; align-items: flex-end; padding: 10px;">
      
      <!-- 対戦相手の表示エリア (Ratio 4 = 192px) -->
      <div id="opponent-container" style="width: 192px; display: flex; justify-content: center;"></div>
      
      <!-- 自分のゲームフィールド (Ratio 5 = 240px) -->
      <div id="game-wrapper" style="position: relative; width: 240px; margin: 0 16px;">
        <div id="player-label" style="margin-bottom: 4px; text-align: center;">あなた</div>
        <div id="stage" style="position:relative; overflow:hidden; background: url(img/puyo_2bg.png)"></div>
        <div id="score" style="overflow:hidden; text-align:right;"></div>
      </div>

      <!-- NEXT puyos: (Ratio 1 = 48px) -->
      <div id="next-container" style="position: relative; width: 48px; height: 480px;">
        <div id="nextPuyos" style="position:absolute; overflow:hidden; top: 0; left: 0; width: 48px; height: 100%;"></div>
      </div>
      
    </div>

    <!-- 隠しimg要素（ぷよ画像プリロード用） -->
    <div style="display:none">
      <img src="img/puyo_1.png" id="puyo_1">
      <img src="img/puyo_2.png" id="puyo_2">
      <img src="img/puyo_3.png" id="puyo_3">
      <img src="img/puyo_4.png" id="puyo_4">
      <img src="img/puyo_5.png" id="puyo_5">
      <img src="img/batankyu.png" id="batankyu">
      <img src="img/zenkeshi.png" id="zenkeshi">
      <img src="img/0.png" id="font0">
      <img src="img/1.png" id="font1">
      <img src="img/2.png" id="font2">
      <img src="img/3.png" id="font3">
      <img src="img/4.png" id="font4">
      <img src="img/5.png" id="font5">
      <img src="img/6.png" id="font6">
      <img src="img/7.png" id="font7">
      <img src="img/8.png" id="font8">
      <img src="img/9.png" id="font9">
    </div>
  </body>
</html>
